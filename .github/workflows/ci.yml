name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover tests

      - name: Run Task 001 check
        run: python scripts/check_task_001.py

      - name: Compile Python files
        shell: bash
        run: |
          targets=()
          for path in agent_exam scripts src tests; do
            if [ -d "$path" ]; then
              targets+=("$path")
            fi
          done
          if [ "${#targets[@]}" -gt 0 ]; then
            python -m compileall "${targets[@]}"
          else
            echo "No Python target directories found."
          fi

